name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run reproduction spine
        run: python3 examples/quick_reproduce.py
      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests
